<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>馬達控制介面</title>
</head>

<body>
    <div class="main-content">
        <!-- 左側：影像串流區 -->
        <div class="video-section">

            <table border="1">
                <tr>
                    <th>I0</th>
                    <th>I90</th>
                </tr>
                <tr>
                    <th>I45</th>
                    <th>I135</th>
                </tr>
            </table>
            <img src="{{ url_for('video_feed') }}" width="612" height="512" class="video-img"/>
            <br>
        </div>
        <!-- 右側：馬達控制區 -->
        <div class="motor-section">
            <label for="current_filter">目前濾鏡狀態：</label>
            <p id="current_filter">{{ colorfilter[item] }}</p>
            <label for="folder_name">備份資料夾名稱：</label>
            <input type="text" id="folder_name" placeholder="請輸入資料夾名稱">
            <button class="button stop" onclick="saveimg()">拍攝</button>
            <button type="button" onclick="sync()">備份</button>
            <br>
        
            <form id="motor-form">
                <div>
                    <label for="steps">步數：</label>
                    <input type="number" id="steps" name="steps" value="{{ steps }}">
                </div>
                <div>
                    <label for="speed">轉速：</label>
                    <input type="number" id="speed" name="speed" value="{{ speed }}">
                </div>
                <br>
                <!-- 按鈕不再提交表單，而是透過 JavaScript 傳送 AJAX 請求 -->
                <button type="button" onclick="sendMotorCommand('reverse')">反轉</button>
                <button type="button" onclick="sendMotorCommand('forward')">正轉</button>
                <br>
                <button type="button" onclick="sendMotorCommand('Previous')">上一個</button>
                <button type="button" onclick="sendMotorCommand('Next')">下一個</button>
                <br>
                <button type="button" onclick="shutdown()">關機</button>
            </form>
        </div>
    </div>
    
    <script>
        function updateFilterStatus() {
            fetch('/get_filter_status')  // 從後端獲取最新濾鏡狀態
            .then(response => response.json())
            .then(data => {
                document.getElementById("current_filter").textContent = data.current_filter;
            })
            .catch(error => console.error('Error:', error));
        }

        // 傳送馬達控制指令
        function sendMotorCommand(action) {
            const steps = document.getElementById("steps").value;
            const speed = document.getElementById("speed").value;
            
            fetch("/motor", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: action, steps: steps, speed: speed })
            })
            .then(response => response.json())
            .then(data => {
                alert(`伺服器回應: ${data.message}`);
                updateFilterStatus();  // 更新濾鏡狀態，確保 UI 立即變更
            })
            .catch(error => console.error("Error:", error));
        }

        // 影像儲存
        function saveimg() {
            fetch('/saveimg', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                alert(data.status === 'success' ? '影像儲存成功' : '影像儲存失敗');
            })
            .catch(error => {
                alert('影像儲存失敗');
                console.error(error);
            });
        }
        function sync() {
            const folder_name = document.getElementById("folder_name").value;
            fetch('/sync', {
                method: 'POST',
                headers: { "Content-Type": "application/json" },  // 告知 Flask 這是 JSON
                body: JSON.stringify({ folder_name: folder_name }) // 傳遞 JSON
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            })
            .catch(error => console.error('Error:', error));
        }


        function shutdown() {
            if (confirm('確定要關機嗎？')) {
                fetch('/shutdown', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                })
                .catch(error => console.error('Error:', error));
            }
        }
    </script>
    
    
</body>

<style>
    /* 全局按鈕樣式 */
    button {
        font-size: 18px; /* 文字變大 */
        padding: 15px 30px; /* 按鈕內部間距 */
        width: 100%; /* 讓按鈕在小螢幕上更容易點擊 */
        max-width: 130px; /* 避免太寬 */
        margin: 10px 0; /* 增加間距 */
        border-radius: 10px; /* 圓角讓按鈕更好看 */
    }
    /* 適用於行動裝置 */
    @media (max-width: 768px) {
        button {
            font-size: 72px; /* 手機上字體更大 */
            padding: 80px 160px; /* 增加按鈕大小 */
        }
    }

    /* 讓表單內的 input 欄位也變大 */
    input[type="number"] {
        font-size: 38px;
        padding: 10px;
        width: 400%;
        max-width: 400px;
    }
    input[type="text"] {
        font-size: 38px;
        padding: 10px;
        width: 400%;
        max-width: 400px;
    }

    /* 讓整個畫面更適合手機 */
    body {
        font-size: 48px;
        text-align: center;
    }

    table {
        margin: 30px auto; /* 讓表格置中 */
        font-size: 24px;
    }

    /* 1. 先給主要內容一個容器 */
    .main-content {
      display: flex;
      flex-direction: row;   /* 桌面預設左右排列 */
      gap: 32px;             /* 欄位間距 */
      justify-content: center;
      align-items: flex-start;
      margin: 40px auto;
      max-width: 1200px;
    }

    /* 2. 手機版改為上下排列 */
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
        gap: 16px;
        max-width: 100%;
      }
    }

    @media (min-width: 1200px) and (max-width: 3840px) {
      body {
        font-size: 18px; /* 提高字體大小，提升可讀性 */
        max-width: 1400px; /* 內容區域不超過 1400px，兩側留白 */
        margin: 0 auto;
      }

      .main-content {
        display: flex;
        gap: 16px; /* 增加欄位間距 */
      }

      img {
        max-width: 100%;
        height: auto;
      }
    }

    .video-section {
        max-width: 650px; /* 或你希望的最大寬度 */
        width: 100%;
    }

    .video-img {
        width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        max-width: 100%;
    }
</style>

</html>
