<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>馬達控制介面</title>
</head>

<body>
    <h1>實時影像串流</h1>
    <div>
        <label for="current_filter">目前濾鏡狀態：</label>
        <p id="current_filter">{{ colorfilter[item] }}</p>
    </div>
    <button class="button stop" onclick="saveimg()">拍攝影像</button>
    <br>
    <table border="1">
        <tr>
            <th>I0</th>
            <th>I90</th>
        </tr>
        <tr>
            <th>I45</th>
            <th>I135</th>
        </tr>
    </table>
    <img src="{{ url_for('video_feed') }}" width="612" height="512" />
    <br>
    <script>
        function saveimg() {
            fetch('/saveimg', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('完成');
                    window.location.reload();  // 刷新頁面，停止影像顯示
                } else {
                    alert('失敗');
                }
            })
            .catch(error => {
                alert('失敗');
                console.error(error);
            });   
        }

        function updateFilterStatus() {
        fetch('/get_filter_status')  // 向後端請求目前的濾鏡狀態
        .then(response => response.json())
        .then(data => {
            document.getElementById("current_filter").textContent = data.current_filter; // 更新畫面
        })
        .catch(error => console.error('Error:', error));
        }
        
    </script>
    
    <h1>馬達控制介面</h1>
    
    <form id="motor-form">
        <div>
            <label for="steps">步數 (-s)：</label>
            <input type="number" id="steps" name="steps" value="{{ steps }}">
        </div>
        <div>
            <label for="speed">轉速 (-p, pps)：</label>
            <input type="number" id="speed" name="speed" value="{{ speed }}">
        </div>
        <br>
        <!-- 按鈕不再提交表單，而是透過 JavaScript 傳送 AJAX 請求 -->
        <button type="button" onclick="sendMotorCommand('reverse')">反轉</button>
        <button type="button" onclick="sendMotorCommand('forward')">正轉</button>
        <br>
        <button type="button" onclick="sendMotorCommand('Previous')">上一個</button>
        <button type="button" onclick="sendMotorCommand('Next')">下一個</button>
    </form>
    
    <script>
    function sendMotorCommand(action) {
        // 取得 input 內的數值
        const steps = document.getElementById("steps").value;
        const speed = document.getElementById("speed").value;
    
        // 發送 AJAX 請求到 Flask
        fetch("/motor", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: action, steps: steps, speed: speed })  // 將資料封裝成 JSON
        })
        .then(response => response.json())  // 解析回傳的 JSON
        .then(data => {
            console.log("Server Response:", data);
            alert(`伺服器回應: ${data.message}`);  // 顯示回應訊息
        })
        .catch(error => console.error("Error:", error));
    }
    </script>
    
    
</body>

<style>
    /* 全局按鈕樣式 */
    button {
        font-size: 20px; /* 文字變大 */
        padding: 15px 30px; /* 按鈕內部間距 */
        width: 100%; /* 讓按鈕在小螢幕上更容易點擊 */
        max-width: 300px; /* 避免太寬 */
        margin: 10px 0; /* 增加間距 */
        border-radius: 10px; /* 圓角讓按鈕更好看 */
    }
    /* 適用於行動裝置 */
    @media (max-width: 768px) {
        button {
            font-size: 32px; /* 手機上字體更大 */
            padding: 40px 80px; /* 增加按鈕大小 */
        }
    }

    /* 讓表單內的 input 欄位也變大 */
    input[type="number"] {
        font-size: 20px;
        padding: 10px;
        width: 100%;
        max-width: 200px;
    }

    /* 讓整個畫面更適合手機 */
    body {
        font-size: 24px;
        text-align: center;
    }

    table {
        margin: 15px auto; /* 讓表格置中 */
        font-size: 24px;
    }
</style>

</html>
